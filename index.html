<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIMS Lite - Lab Inventory Management System</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/config.js"></script>
<script defer src="js/api.js"></script>
<script defer src="js/app.js"></script>
<script defer src="js/dashboard.js"></script>
<script defer src="js/inventory.js"></script>
<script defer src="js/alerts.js"></script>
<script defer src="js/transactions.js"></script>
<script defer src="js/documents.js"></script>
</head>
<body>
<div id="app">
<aside class="sidebar">
<div class="logo"><h1>LIMS Lite</h1><p>Lab Inventory Management System</p></div>
<nav>
<button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
<button class="nav-btn" data-page="inventory">📦 Inventory</button>
<button class="nav-btn" data-page="alerts">⚠ Alerts</button>
<button class="nav-btn" data-page="penerimaan">📥 Penerimaan</button>
<button class="nav-btn" data-page="distribusi">📤 Distribusi</button>
<button class="nav-btn" data-page="pemusnahan">🗑 Pemusnahan</button>
<button class="nav-btn" data-page="documents">📄 COA & MSDS</button>
</nav>
<div class="sidebar-footer"><span id="connectionStatus">🔴 Offline</span></div>
</aside>
<main class="main">
<header class="topbar">
<div><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Inventory • Reagent • Document Management</p></div>
<div class="top-actions"><span id="lastSync">Belum sinkron</span><button id="refreshBtn">Refresh</button></div>
</header>
<section id="loadingScreen"><h2>Menghubungkan ke Google Sheets...</h2><p>Mohon tunggu.</p></section>
<section id="errorScreen" hidden><h2>Koneksi gagal</h2><p id="errorMessage"></p><button id="retryBtn">Coba Lagi</button></section>
<section id="dashboardPage"></section>
<section id="inventoryPage" hidden></section>
<section id="alertsPage" hidden></section>
<section id="penerimaanPage" hidden></section>
<section id="distribusiPage" hidden></section>
<section id="pemusnahanPage" hidden></section>
<section id="documentsPage" hidden></section>
</main>
</div>
</body>
</html>
